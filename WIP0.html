<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Experiment</title>
</head>
<body>
<!-- Poem Text Area -->
<div id="poemDisplay">Click the button...</div>

<style> 
  /* Styling the Page */
  body{
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  /* Styling the Button */
  button{
    position: absolute;
    padding: 10px 14px;
    border: none;
    background: #444;
    color: white;
    cursor: pointer;
    border-radius: 6px;
    transition: transform 0.2s, background 0.2s;
  }

  button:hover{
    transform: scale(1.15);
    background: #666;
  }

  /* Displaying the Poem */
  #poemDisplay{
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    padding: 10px;
  }
</style>

<script>
/* The Data */  
const poemLines = [
    "Buttons hold together more than cloth,",
    "They fasten moments, memory, and loss.",
    "Each small circle keeps a story closed,",
    "Until a hand decides to let it go,",
    "And what was hidden slowly comes apart."
]; 

let currentLineIndex = 0;
let totalButtons = 0;
const MAX_BUTTONS = 100;

/* Help Functions */
function getRandomPosition(){
    const padding = 80;
    const x = Math.random() * (window.innerWidth - padding);
    const y = Math.random() * (window.innerHeight - padding);
    return {x,y};
}

function updatePoem(){
    const display = document.getElementById("poemDisplay");
    display.textContent = poemLines[currentLineIndex % poemLines.length];
    currentLineIndex++;
}

/* Creating the Button */
function createButton(x,y){
    if (totalButtons >= MAX_BUTTONS) return;

    const btn = document.createElement("button");
    btn.textContent = "Button";

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    totalButtons++;

    btn.addEventListener("click", () =>{
        updatePoem();

        // Move the Button Randomly when clicked //
        const newPos = getRandomPosition();
        btn.style.left = newPos.x + "px";
        btn.style.top = newPos.y + "px";

        // Slight Rotation to give this an experimental feel //
        btn.style.transform = "rotate(" + (Math.random() * 360) + "deg)";

        // Spawing more Buttons //
        for (let i = 0; i < 2; i++){
            const pos = getRandomPosition();
            createButton(pos.x, pos.y);
        }
    });

    document.body.appendChild(btn);
}

/* The Initial Setup */
function init(){
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    createButton(centerX, centerY);
}

window.onload = init;
</script> 
</body>
</html>
