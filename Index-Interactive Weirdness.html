<!DOCTYPE Html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewpoint" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0b0b18 0%, #000000 100%);
    font-family:system-ui;
    color:white;
}

/* The Canvas */
#bg{
    position:fixed;
    inset:0;
    z-index:1;
}

/* The Button Panel */
#controls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:10;
    display:flex;
    gap:10px;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

/* The Message */
#message{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    font-size:1.1rem;
    opacity:0.8;
    text-align:center;
    max-width:500px;
}
</style>
</head>
<body>

<div id="controls">
    <button onclick="setState('calm')">Calm</button>
    <button onclick="setState('active')">Active</button>
    <button onclick="setState('collapse')">Collapse</button>
    <button onclick="setState('rebirth')">Rebirth</button>
</div>

<div id="message"></div>

<canvas id="bg"></canvas>

<audio id="music" loop autoplay muted>
    <source src="Snowfall.mp3" type="audio/mpeg">
</audio>

<script>
/* The Canvas */
const canvas = document.getElementBYId("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* The Audio */

</script>
</body>
</html>
