<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0b0b18 0%, #000000 100%);
    font-family:system-ui;
    color:white;
}

/* Canvas */
#bg{
    position:fixed;
    inset:0;
    z-index:1;
}

/* Buttons */
#controls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:10;
    display:flex;
    gap:10px;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

/* Message */
#message{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    font-size:1.1rem;
    opacity:0.8;
    text-align:center;
    max-width:500px;
}
</style>
</head>

<body>

<div id="controls">
    <button onclick="setState('calm')">Calm</button>
    <button onclick="setState('active')">Active</button>
    <button onclick="setState('collapse')">Collapse</button>
    <button onclick="setState('rebirth')">Rebirth</button>
</div>

<div id="message"></div>

<canvas id="bg"></canvas>

<audio id="music" loop autoplay muted>
    <source src="Snowfall.mp3" type="audio/mpeg">
</audio>

<script>

/* The Canvas */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* Fixing the Audio */
const music = document.getElementById("music");

document.addEventListener("click", ()=>{
    music.muted = false;
    music.play().catch(()=>{});
}, {once:true});

/* The State System */
let state = "calm";

const messages = {
    calm: "everything drifts. nothing demands your attention.",
    active: "motion responds. the system notices you.",
    collapse: "everything pulls inward. structure breaks.",
    rebirth: "scattered again. nothing stays fixed."
};

function setState(newState){
    state = newState;
    document.getElementById("message").textContent = messages[state];
}

/* Mouse */
let mouse = {x:0,y:0};

window.addEventListener("mousemove",(e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* Time */
let time = 0;

/* The Particles */
const particles = [];
const COUNT = 220;

for(let i=0;i<COUNT;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:0,
        vy:0,
        size:Math.random()*2+1,
        hue:Math.random()*360
    });
}

/* The Blobs */
const blobs = [];

for(let i=0;i<6;i++){
    blobs.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5),
        vy:(Math.random()-0.5),
        size:260 + Math.random()*60,
        hue:Math.random()*360
    });
}

/* Animation */
function animate(){

    time += 0.01; // ✅ FIX ADDED

    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* Blobs */
    blobs.forEach(b=>{

        let speed = state === "active" ? 0.05 : 0.02;

        b.vx += (Math.random()-0.5)*speed;
        b.vy += (Math.random()-0.5)*speed;

        blobs.forEach(o=>{
            if(o===b) return;

            let dx=o.x-b.x;
            let dy=o.y-b.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<300 && state!=="collapse"){
                b.vx+=dx*0.0003;
                b.vy+=dy*0.0003;
            }

            if(d<100){
                b.vx-=dx*0.002;
                b.vy-=dy*0.002;
            }
        });

        b.vx*=0.97;
        b.vy*=0.97;

        b.x+=b.vx;
        b.y+=b.vy;

        if(b.x<0) b.x=canvas.width;
        if(b.x>canvas.width) b.x=0;
        if(b.y<0) b.y=canvas.height;
        if(b.y>canvas.height) b.y=0;

        const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.size);
        g.addColorStop(0,`hsl(${b.hue},80%,60%)`);
        g.addColorStop(1,"transparent");

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    /* Particles */
    particles.forEach(p=>{

        let flowX = Math.sin(time)*0.1;
        let flowY = Math.cos(time)*0.1;

        p.vx += flowX;
        p.vy += flowY;

        if(state==="active"){
            let dx=p.x-mouse.x;
            let dy=p.y-mouse.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<120){
                p.vx+=dx*0.01;
                p.vy+=dy*0.01;
            }
        }

        if(state==="collapse"){
            blobs.forEach(b=>{
                let dx=b.x-p.x;
                let dy=b.y-p.y;
                let d=Math.sqrt(dx*dx+dy*dy);

                if(d<200){
                    p.vx+=dx*0.003;
                    p.vy+=dy*0.003;
                }
            });
        }

        if(state==="rebirth"){
            p.vx += (Math.random()-0.5)*0.3;
            p.vy += (Math.random()-0.5)*0.3;
        }

        p.vx*=0.95;
        p.vy*=0.95;

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0) p.x=canvas.width;
        if(p.x>canvas.width) p.x=0;
        if(p.y<0) p.y=canvas.height;
        if(p.y>canvas.height) p.y=0;

        ctx.fillStyle=`hsl(${p.hue},90%,65%)`;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

/* Safe Start */
window.onload = () => {
    setState("calm");
    animate();
};

</script>

</body>
</html>
