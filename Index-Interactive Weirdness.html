<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<title>Echoes</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0b0b18 0%, #000000 100%);
    font-family: 'Inter', sans-serif;
    color:white;
}

#bg{
    position:fixed;
    inset:0;
    z-index:1;
}

#controls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:10;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

#message{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    font-size:1.1rem;
    opacity:0.8;
    text-align:center;
    max-width:500px;
}
</style>
</head>

<body>

<div id="controls">
    <button onclick="setState('calm')">Calm</button>
    <button onclick="setState('active')">Active</button>
    <button onclick="setState('collapse')">Collapse</button>
    <button onclick="setState('rebirth')">Rebirth</button>
    <button id="musicBtn">Play Sound</button>
</div>

<div id="message"></div>

<canvas id="bg"></canvas>

<audio id="music" loop>
    <source src="Snowfall.mp3" type="audio/mpeg">
</audio>

<script>

/* The Canvas */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* Time */
let time = 0;

/* The State System */
let state = "calm";

const messages = {
    calm: "Everything slows down. Nothing needs to happen.",
    active: "You disturb the surface, and it answers back.",
    collapse: "Everything folds inward. Nothing escapes.",
    rebirth: "It spreads again, like nothing happened."
};

function setState(newState){
    state = newState;
    document.getElementById("message").textContent = messages[state];
}

/* The Music Control */
const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");

let isPlaying = false;

musicBtn.addEventListener("click",()=>{
    if(!isPlaying){
        music.play().then(()=>{
            isPlaying = true;
            musicBtn.textContent = "Pause Sound";
        }).catch(()=>{});
    } else {
        music.pause();
        isPlaying = false;
        musicBtn.textContent = "Play Sound";
    }
});

/* The Mouse */
let mouse = {x:0,y:0};

window.addEventListener("mousemove",(e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* The Particles */
const particles = [];
const COUNT = 220;

for(let i=0;i<COUNT;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:0,
        vy:0,
        size:Math.random()*2+1,
        hue:Math.random()*360
    });
}

/* The Blobs */
const blobs = [];

for(let i=0;i<6;i++){
    blobs.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5),
        vy:(Math.random()-0.5),
        size:260 + Math.random()*60,
        hue:Math.random()*360
    });
}

/* The Gravity Wells */
const wells = [];

for(let i=0;i<3;i++){
    wells.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        strength:0.04 + Math.random()*0.03
    });
}

/* The Sparkles */
const sparkles = [];
const SPARKLE_COUNT = 80;

for(let i=0;i<SPARKLE_COUNT;i++){
    sparkles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*3 + 1,
        life:Math.random()*100,
        maxLife:80 + Math.random()*60,
        vx:0,
        vy:0
    });
}

function getSparkleColor(){
    if(state==="calm") return "rgba(255,255,255,";
    if(state==="active") return "rgba(0,255,255,";
    if(state==="collapse") return "rgba(255,120,120,";
    if(state==="rebirth") return "rgba(180,255,200,";
}

/* The Animation */
function animate(){

    time += 0.01;

    ctx.fillStyle="rgba(0,0,0,0.12)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* The Blobs */
    blobs.forEach(b=>{
        let speed = state==="active"?0.05:0.02;

        b.vx += (Math.random()-0.5)*speed;
        b.vy += (Math.random()-0.5)*speed;

        blobs.forEach(o=>{
            if(o===b) return;

            let dx=o.x-b.x;
            let dy=o.y-b.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<300 && state!=="collapse"){
                b.vx+=dx*0.0003;
                b.vy+=dy*0.0003;
            }

            if(d<100){
                b.vx-=dx*0.002;
                b.vy-=dy*0.002;
            }
        });

        b.vx*=0.97;
        b.vy*=0.97;

        b.x+=b.vx;
        b.y+=b.vy;

        if(b.x<0) b.x=canvas.width;
        if(b.x>canvas.width) b.x=0;
        if(b.y<0) b.y=canvas.height;
        if(b.y>canvas.height) b.y=0;

        const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.size);
        g.addColorStop(0,`hsl(${b.hue},80%,60%)`);
        g.addColorStop(1,"transparent");

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    /* Wells Drifting */
    wells.forEach(w=>{
        w.x += Math.sin(time*0.3)*0.3;
        w.y += Math.cos(time*0.3)*0.3;
    });

    /* The Constellations */
    let maxDist = state==="active"?140:90;

    for(let i=0;i<particles.length;i++){
        for(let j=i+1;j<particles.length;j++){

            let p1=particles[i];
            let p2=particles[j];

            let dx=p1.x-p2.x;
            let dy=p1.y-p2.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<maxDist){
                let opacity = 1 - (dist/maxDist);
                ctx.strokeStyle=`rgba(255,255,255,${opacity*0.25})`;
                ctx.lineWidth=0.6;

                ctx.beginPath();
                ctx.moveTo(p1.x,p1.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.stroke();
            }
        }
    }

    /* The Particles */
    particles.forEach(p=>{

        let flowX = Math.sin(time)*0.1;
        let flowY = Math.cos(time)*0.1;

        p.vx += flowX;
        p.vy += flowY;

        wells.forEach(w=>{
            let dx=w.x-p.x;
            let dy=w.y-p.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<300){
                p.vx += dx*w.strength/dist;
                p.vy += dy*w.strength/dist;
            }
        });

        if(state==="active"){
            let dx=p.x-mouse.x;
            let dy=p.y-mouse.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<120){
                p.vx+=dx*0.01;
                p.vy+=dy*0.01;
            }
        }

        if(state==="collapse"){
            blobs.forEach(b=>{
                let dx=b.x-p.x;
                let dy=b.y-p.y;
                let d=Math.sqrt(dx*dx+dy*dy);

                if(d<200){
                    p.vx+=dx*0.003;
                    p.vy+=dy*0.003;
                }
            });
        }

        if(state==="rebirth"){
            p.vx += (Math.random()-0.5)*0.3;
            p.vy += (Math.random()-0.5)*0.3;
        }

        p.vx*=0.95;
        p.vy*=0.95;

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0) p.x=canvas.width;
        if(p.x>canvas.width) p.x=0;
        if(p.y<0) p.y=canvas.height;
        if(p.y>canvas.height) p.y=0;

        ctx.fillStyle=`hsl(${p.hue},90%,65%)`;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    /* The Sparkles */
    sparkles.forEach((s, i)=>{
        blobs.forEach(b=>{
            let dx = b.x - s.x;
            let dy = b.y - s.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 220){

                let force = (1 - dist / 220) * 0.02;

                s.vx += dx * force;
                s.vy += dy * force;
            }
        });
        // A Smooth Global Blink Rhythm //
        let blink = (Math.sin(time * 2 + i) + 1) * 0.5;

        ctx.fillStyle = getSparkleColor() + (blink * 0.9) + ")";

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();

        // Movement (Gravity, Drifting, and Floating) //
        s.x += (s.vx || 0) * 0.6;
        s.y += ((s.vy || 0) * 0.6) - 0.08;

        // Stability //
        s.vx *= 0.92;
        s.vy *= 0.92;

        // Wrapping Reset //
        if(s.y < -10){
            s.y = canvas.height + 10;
            s.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animate);
}

/* At the Start */
window.onload = () => {
    setState("calm");
    animate();
};

</script>

</body>
</html>
