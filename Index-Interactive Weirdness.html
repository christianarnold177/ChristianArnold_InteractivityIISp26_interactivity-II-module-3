<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0b0b18 0%, #000000 100%);
}

/* The Canvas */
#bg{
    position:fixed;
    inset:0;
    z-index:2;
}

/* Optional Button */
#chaosBtn{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10;
    padding:10px 16px;
    border-radius:20px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<button id="chaosBtn">Press This!</button>
<canvas id="bg"></canvas>

<audio id="music" loop>
    <source src="snowfall.mp3" type="audio/mpeg">
</audio>

<script>
/* The Canvas */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* Music */
const music = document.getElementById("music");

window.addEventListener("load", ()=>{
    music.volume = 0.6;
    music.play().catch(()=>{});
});

/* Mouse Field */
let mouse = {x:0,y:0};
let time = 0;

window.addEventListener("mousemove",(e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* The Particles */
const particles = [];
const COUNT = 250;

for(let i=0;i<COUNT;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.3,
        vy:(Math.random()-0.5)*0.3,
        size:Math.random()*2.5+0.8,
        hue:Math.random()*360,
        tx:null,
        ty:null
    });
}

/* The Blobs (Living System) */
const blobs = [];

const blobColors = [
    "#ff4d6d",
    "#00d4ff",
    "#ffd60a",
    "#7b2cbf",
    "#00ff88",
    "#4361ee",
    "#ff00ff"
];

// Spawning Blobs //
for(let i=0;i<7;i++){
    blobs.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*1,
        vy:(Math.random()-0.5)*1,
        size:260 + Math.random()*80,
        color:blobColors[i]
    });
}

/* Shape Mode */
let shapeMode = false;
let shapeTime = 0;

const chaosBtn = document.getElementById("chaosBtn");

chaosBtn.addEventListener("click",()=>{
    shapeMode = true;
    shapeTime = 0;

    chaosBtn.textContent = "scattering...";
    generateSpiral();
});

function generateSpiral(){
    const cx = canvas.width/2;
    const cy = canvas.height/2;

    particles.forEach((p,i)=>{
        let a = i * 0.35;
        let r = i * 2;

        p.tx = cx + Math.cos(a)*r;
        p.ty = cy + Math.sin(a)*r;
    });
}

/* The Animation */
function animate(){

    time += 0.01;

    ctx.fillStyle="rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* The Blobs (Living Behavior) */
    for(let i=0;i<blobs.length;i++){
        let b = blobs[i];

        // Drifting //
        b.vx += (Math.random()-0.5)*0.02;
        b.vy += (Math.random()-0.5)*0.02;

        for(let j=0;j<blobs.length;j++){
            if(i===j) continue;

            let o = blobs[j];

            let dx = o.x - b.x;
            let dy = o.y - b.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            // Merging (Attract)
            if(dist < 450 && dist > 120){
                b.vx += dx * 0.0004;
                b.vy += dy * 0.0004;
            }

            // Spliting (Repel)
            if(dist < 120){
                b.vx -= dx * 0.002;
                b.vy -= dy * 0.002;
            }
        }

        b.vx *= 0.97;
        b.vy *= 0.97;

        b.x += b.vx;
        b.y += b.vy;

        // Wrapping //
        if(b.x < -200) b.x = canvas.width + 200;
        if(b.x > canvas.width + 200) b.x = -200;
        if(b.y < -200) b.y = canvas.height + 200;
        if(b.y > canvas.height + 200) b.y = -200;
    }

    /* Drawing the Blobs (Soft Cosmic Bodies) */
    blobs.forEach(b=>{
        const grad = ctx.createRadialGradient(
            b.x,b.y,0,
            b.x,b.y,b.size
        );

        grad.addColorStop(0,b.color);
        grad.addColorStop(0.6,b.color);
        grad.addColorStop(1,"transparent");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    /* The Particles (Adding Space Flow) */
    particles.forEach(p=>{
         let flowX = Math.sin(time * 0.5) * 0.15;
    let flowY = Math.cos(time * 0.5) * 0.15;

    // Star Inertia + Drift //
    p.vx += flowX;
    p.vy += flowY;

    // Subtle Randomness //
    p.vx += (Math.random()-0.5)*0.006;
    p.vy += (Math.random()-0.5)*0.006;

    // Mouse Repulsion //
    let dx = p.x - mouse.x;
    let dy = p.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 140){
        p.vx += dx * 0.008;
        p.vy += dy * 0.008;
    }

    // Shape Mode Attraction //
    if(shapeMode){
        p.vx += (p.tx - p.x) * 0.02;
        p.vy += (p.ty - p.y) * 0.02;
    }

    // Damping (smooth space motion) //
    p.vx *= 0.96;
    p.vy *= 0.96;

    p.x += p.vx;
    p.y += p.vy;

    // Infinite Wrap Space //
    if(p.x < 0) p.x = canvas.width;
    if(p.x > canvas.width) p.x = 0;
    if(p.y < 0) p.y = canvas.height;
    if(p.y > canvas.height) p.y = 0;

    // Render the Star //
    ctx.fillStyle = `hsl(${p.hue},90%,65%)`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
});

    /* Resetting the Shape Mode */
    if(shapeMode){
        shapeTime++;
        if(shapeTime > 160){
            shapeMode = false;
            chaosBtn.textContent = "Press This!";
        }
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
