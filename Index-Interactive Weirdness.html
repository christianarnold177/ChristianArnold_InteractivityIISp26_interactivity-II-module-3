<!DOCTYPE Html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewpoint" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0b0b18 0%, #000000 100%);
    font-family:system-ui;
    color:white;
}

/* The Canvas */
#bg{
    position:fixed;
    inset:0;
    z-index:1;
}

/* The Button Panel */
#controls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:10;
    display:flex;
    gap:10px;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
}

/* The Message */
#message{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    font-size:1.1rem;
    opacity:0.8;
    text-align:center;
    max-width:500px;
}
</style>
</head>
<body>

<div id="controls">
    <button onclick="setState('calm')">Calm</button>
    <button onclick="setState('active')">Active</button>
    <button onclick="setState('collapse')">Collapse</button>
    <button onclick="setState('rebirth')">Rebirth</button>
</div>

<div id="message"></div>

<canvas id="bg"></canvas>

<audio id="music" loop autoplay muted>
    <source src="Snowfall.mp3" type="audio/mpeg">
</audio>

<script>
/* The Canvas */
const canvas = document.getElementBYId("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* The Audio */
const music = document.getElementById("music");

// Autoplay Fallback //
document.addEventListener("click", ()=>{
    music.muted = false;
    music.play().catch(()=>{});
}, {once:true});

/* The State System */
let state = "calm";

const messages = {
    calm: "Everything drifts. Nothing demands your attention.",
    active: "Motion responds. The system notices you.",
    collapse: "Everything pulls inward. Structure breaks.",
    rebirth: "Scattered again. Nothing stays fixed."
};

function setState(newState){
    state = newState;
    document.getElementById("message").textContent = messages[state];
}

/* The Mouse */
let mouse = {x:0,y:0};

window.addEventListener("mousemove",(e)=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* The Time */
let time = 0;

/* The Particles */
const particles = [];
const COUNT = 220;

for(let i=0;i<COUNT;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:0,
        vy:0,
        size:Math.random()*2+1,
        hue:Math.random()*360
    });
}
</script>
</body>
</html>
