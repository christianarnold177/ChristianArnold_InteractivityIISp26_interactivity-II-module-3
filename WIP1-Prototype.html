<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIP1-Prototype</title>
</head>
<body>
 <header>
    <h1>Interactive Prototype</h1>
    <button id="themeToggle">Toggle Dark Mode</button>
 </header>

 <main>
    <!-- Interaction Button -->
    <section>
        <h2>Special Button</h2>
        <button id="actionBtn">Click Me!</button>
        <div id="interaction-output"></div>
    </section>

    <!-- The Simple Form -->
    <section>
        <h2>Contact Form</h2>
        <form id="contactForm">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" placeholder="Your Message" rows="3" required></textarea>
            <button type="submit">Submit</button>
        </form>
        <div id="form-output"></div>
    </section>
 </main>

 <style>
    body{
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0f2f5;
        color: #333;
        transition: background-color 0.3s, color 0.3s;
    }

    header{
        background-color: #4CAF50;
        color: white;
        padding: 1rem;
        text-align: center;
    }

    main{
        max-width: 600px;
        margin: 2rem auto;
        padding: 2rem;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    button{
        padding: 0.5rem 1rem;
        font-size: 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
    }

    button:hover{
        background-color: #45a049;
    }

    input, textarea{
        width: 100%;
        padding: 0.5rem;
        margin: 0.5rem 0 1rem 0;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .dark-theme{
        background-color: #1e1e1e;
        color: #ddd;
    }

    .dark-theme header{
        background-color: #111;
        color: #f1f1f1;
        box-shadow: 0 2px 6px rgba(255, 255, 255, 0.05);
    }

    .dark-theme main{
        background-color: #2c2c2c;
    }

    .dark-theme button{
        background-color: #555;
    }

    .dark-theme button:hover{
        background-color: #777;
    }

    #interaction-output, #form-output{
        margin-top: 1rem;
        font-weight: bold;
    }
 </style>
 
 <script>
    // Button Interaction //
    const actionBtn = document.getElementById('actionBtn');
    const interactionOutput = document.getElementById('interaction-output');
    actionBtn.addEventListener('click', () => {
        interactionOutput.textContent = "Nice! You clicked on the Button!";
    });

    // Form Interaction //
    const contactForm = document.getElementById('contactForm');
    const formOutput = document.getElementById('form-output');
    contactForm.addEventListener('submit', (e) =>{
        e.preventDefault();
        const name = contactForm.name.value.trim();
        formOutput.textContent = `Thanks, ${name}! Message has been recieved.`;
        contactForm.reset();
    });

    // Dark Mode Toggle //
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
        });
    }
 </script>
</body>
</html>
