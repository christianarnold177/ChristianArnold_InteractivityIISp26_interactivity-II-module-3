<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Art Prototype</title>
</head>
<body>
<div class="bg-art" id="bgArt"></div>
<header>
    <h1>Echoes of Input</h1>
    <button id="themeToggle">Toggle</button>
</header>

<main>
    <h2>Say Something Here</h2>
    <p>Your input helps shapes the experience.</p>

    <form id="form">
        <input type="text" name="name" placeholder="Name" required>
        <textarea name="message" rows="4" placeholder="Write as free as you want..." required></textarea>
        <button type="submit">Send It</button>
    </form>

    <div id="form-output"></div>
</main>

<style>
:root{
    --bg: #f0f2f5;
    --surface: #ffffff;
    --text: #222;
    --accent: #4CAF50;
}

.dark-theme{
    --bg: #111;
    --surface: #1e1e1e;
    --text: #eee;
    --accent: #6ddc7a;
}

body{
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--text);
    color: var(--text);
    transition: background 0.4s ease, color 0.4s ease;
}

/* The Header */
header{
    text-align: center;
    padding: 1.5rem;
}

header h1{
    font-weight: 500;
    letter-spacing: 1px;
}

/* Layout for the main portion */
main{

}
</style>

<script>

</script>

</body>
</html>
