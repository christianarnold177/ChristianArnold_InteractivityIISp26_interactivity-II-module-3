<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Art Prototype</title>
</head>
<body>
<div class="bg-art" id="bgArt"></div>
<header>
    <h1>Echoes of Input</h1>
    <button id="themeToggle">Toggle</button>
</header>

<main>
    <h2>Say Something Here</h2>
    <p>Your input helps shapes the experience.</p>

    <form id="form">
        <input type="text" name="name" placeholder="Name" required>
        <textarea name="message" rows="4" placeholder="Write as free as you want..." required></textarea>
        <button type="submit">Send It</button>
    </form>
</main>

</script>

</body>
</html>
