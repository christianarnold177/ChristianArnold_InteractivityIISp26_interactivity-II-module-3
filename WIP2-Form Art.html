<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes of Input</title>
</head>
<body>

<header class="header">
    <div class="title">Echoes of Input</div>
    <div class="subtitle">The Form Becomes Expression</div>
</header>

<div class="blob one"></div>
<div class="blob two"></div>
<div class="blob three"></div>
<div class="blob four"></div>
<div class="blob five"></div>

<main>
    <h1>Echoes of Input</h1>
    <textarea id="input" placeholder="Come type something..."></textarea>
    <div id="output"></div>
    <div class="hint">Your input can reshape color, motion, and meaning!</div>
</main>

<style>
/* The Design System */
:root{
    --bg1: #0f0f1a;
    --bg2: #1a1a2e;
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accebt3: #22c55e;
    --accent4: #f97316;
    --accent5: #ef4444;
    --text: #f1f1f1;
}

body{
    margin: 0;
    font-family: system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    background: radial-gradient(circle at center, var(--bg2), var(--bg1));
    transition: background 0.6s ease;
}

/* The Header Floats */
.header{
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.75;
    pointer-events: none;
}

.header .title{
    font-size: 0.95rem;
    letter-spacing: 1px;
}

.header .subtitle{
    font-size: 0.75rem;
    opacity: 0.6;
}

/* Adding Floating Blobs */
.blob{
    position: fixed;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.5;
    animation: float 12s infinite ease-in-out;
    z-index: 0;
}

.blob.one{
    background: var(--accent1);
    top: -120px;
    left: -120px;
}

.blob.two{
    background: var(--accent2);
    bottom: -140px;
    right: -140px;
    animation-delay: 3s;
}

.blob.three{
    background: var(--accent3);
    top: 40%;
    left: 50%;
    animation-delay: 6s;
}

.blob.four{
    background: var(--accent4);
    top: 10%;
    right: 20%;
    animation-delay: 2s;
}

.blob.five{
    background: var(--accent5);
    bottom: 20%;
    left: 30%;
    animation-delay: 5s;
}

@keyframes float{
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(50px,-50px) scale(1.1); }
}

/* The Center Layout (Art Space) */
main{
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
}

/* Title */
h1{
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 1rem;
}

textarea{
    width: 100%;
    max-width: 520px;
    height: 130px;
    padding: 1rem;
    border: none;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 1rem;
    outline: none;
    backdrop-filter: blur(12px);
    transition: all 0.4s ease;
}

textarea:focus{
    transform: scale(1.03);
    background: rgba(255,255,255,0.12);
}

/* The Output */
#output{
    margin-top: 2rem;
    font-size: 1.15rem;
    max-width: 650px;
    min-height: 2rem;
    opacity: 0.95;
}

/* The Cursor */
.cursor{
    display: inline-block;
    width: 2px;
    height: 18px;
    background: white;
    margin-left: 4px;
    animation: blink 1s infinite;
}

@keyframes blink{
    50% { opacity: 0; }
}

/* A Hint */
.hint{
    margin-top: 1rem;
    font-size: 0.85rem;
    opacity: 0.5;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('input');
    const output = document.getElementById('output');

    let typingInterval = null;
    let timeout = null;

    // Color System //
    function shiftColors(len){
        const base = (len * 10) % 360;

        document.documentElement.style.setProperty('--accent1', `hsl(${base}, 80%, 60%)`);
        document.documentElement.style.setProperty('--accent2', `hsl(${base + 40}, 85%, 60%)`);
        document.documentElement.style.setProperty('--accent3', `hsl(${base + 80}, 80%, 55%)`);
        document.documentElement.style.setProperty('--accent4', `hsl(${base + 120}, 100%, 65%)`);
        document.documentElement.style.setProperty('--accent5', `hsl(${base + 160}, 85%, 55%)`);
    }

    // Typing Animation //
    function typeText(text){
        if (typingInterval) clearInterval(typingInterval);

        output.innerHTML = '';
        let i = 0;

        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        output.appendChild(cursor);

        typingInterval = setInterval(() => {
            if (i < text.length) {
                cursor.insertAdjacentText('beforebegin', text[i]);
                i++;
            } else {
                clearInterval(typingInterval);
                cursor.remove();
            }
        }, 28);
    }

    // Input Reaction //
    input.addEventListener('input', () =>{
        const value = input.value;

        shiftColors(value.length);

        if (value.length === 0){
            output.textContent = '';
        }
    });

    // Adding a Pause Response //
    input.addEventListener('keyup', () =>{
        clearTimeout(timeout);

        timeout = setTimeout(() =>{
            const value = input.value.trim();

            if (value.length > 0) {
                typeText(`"${value}" becomes space, rhythm, and color.`);
            }
        }, 450);
    });
});
</script>

</body>
</html>
