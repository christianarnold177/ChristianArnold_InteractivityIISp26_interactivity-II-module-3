<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>
<style>
body{
    margin: 0;
    overflow: hidden;
    background: #0f0f1a;
}

#bg{
    position: fixed;
    inset: 0;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<script>
// Setting up the canvas //
const canvas = document.getElementById("bg");
const ctx = canvas.getContent("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// The Particles //
const particles = [];
const COUNT = 80;

function randomShape(){
    const shapes = ["circle", "square", "triangle", "diamond", "star", "line"];
    return shapes[Math.floor(Math.random()*shapes.length)];
}

for(let i=0; i<COUNT;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: 0,
        vy: 0,
        size: Math.random()*3+1,
        shape: randomShape(),
        hue: Math.random()*360,
        tx: null,
        ty: null
    });
}

// The Flow Field //
let time = 0;

function flowAngle(x,y){
    return Math.sin(x*0.002 + time) + Math.cos(y*0.002 + time);
}

// The Pattern System //
let patternMode = false;
let patternTime = 0;
let patternType = null;

function generateSpiral(){
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    particles.forEach((p,i)=>{
        let angle = i * 0.3;
        let radius = i * 2;

        p.tx = cx + Math.cos(angle) * radius;
        p.ty = cy + Math.sin(angle) * radius;
    });
}

function generateSmiley(){
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    particles.forEach((p,i)=>{
        if(i < particles.length * 0.6){
            let angle = (i / (particles.length * 0.6)) * Math.PI * 2;
            p.tx = cx + Math.cos(angle) * 120;
            p.ty = cy + Math.sin(angle) * 120;
        }
        else if(i < particles.length * 0.8){
            let side = i % 2 === 0 ? -40 : 40;
            p.tx = cx + side;
            p.ty = cy - 40;
        }
        else{
            let t = (i - particles.length*0.8) / (particles.length*0.2);
            let angle = Math.PI * t;
            p.tx = cx + Math.cos(angle) * 70;
            p.ty = cy + Math.sin(angle) * 50 + 30;
        }
    });
}

// Adding the Clicking Interaction //
canvas.addEventListener("click", (e)=>{
    const mx = e.clientX;
    const my = e.clientY;

    for(let p of particles){
        let dx = p.x - mx;
        let dy = p.y - my;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 150){
            p.vx += dx * 0.06;
            p.vy += dy * 0.06;
            p.shape = randomShape();
            p.hue += 40;
        }
    }
});

// Adding the Hover Interaction //
canvas.addEventListener("mousemove", (e)=>{
    const mx = e.clientX;
    const my = e.clientY;

    for(let p of particles){
        let dx = p.x - mx;
        let dy = p.y - my;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 80){
            p.vx += dx * 0.01;
            p.vy += dy * 0.01;
            p.hue += 3;
        }
    }
});

// Drawing the Shapes //

</script>
</body>
</html>
