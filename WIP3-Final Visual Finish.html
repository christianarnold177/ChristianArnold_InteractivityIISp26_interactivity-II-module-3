<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f0f1a;
    font-family:Arial, sans-serif;
}

/* The Canvas */
#bg{
    position:fixed;
    inset:0;
    z-index:2;
}

/* The Chaos Button */
#chaosBtn{
    position:fixed;
    top:30px;
    right:30px;
    z-index:10;

    padding:14px 22px;
    border:none;
    border-radius:30px;

    background:rgba(255,255,255,0.12);
    color:white;
    cursor:pointer;

    backdrop-filter:blur(12px);
    font-size:14px;
    letter-spacing:1px;

    transition:0.3s ease;
}

#chaosBtn:hover{
    transform:scale(1.08) rotate(3deg);
}

/* The Blobs */
.blob{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    opacity:0.45;
    z-index:1;
    animation:floatBlob 18s infinite ease-in-out;
}

.blob1{
    width:500px;
    height:500px;
    background:#ff4d6d;
    top:-100px;
    left:-100px;
}

.blob2{
    width:550px;
    height:550px;
    background:#00d4ff;
    bottom:-150px;
    right:-100px;
    animation-delay:2s;
}

.blob3{
    width:450px;
    height:450px;
    background:#ffd60a;
    top:30%;
    left:50%;
    animation-delay:4s;
}

.blob4{
    width:480px;
    height:480px;
    background:#7b2cbf;
    top:10%;
    right:20%;
    animation-delay:6s;
}

.blob5{
    width:520px;
    height:520px;
    background:#00ff88;
    bottom:15%;
    left:20%;
    animation-delay:8s;
}

@keyframes floatBlob{
    0%,100%{
        transform:translate(0,0) scale(1);
    }
    50%{
        transform:translate(80px,-60px) scale(1.15);
    }
}
</style>
</head>
<body>
<!-- The Weird Button -->
<button id="chaosBtn">Please Don't Press This Button!</button>

<!-- The Background Blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>
<div class="blob blob5"></div>

<canvas id="bg"></canvas>

<!-- The Calm Music -->
<audio id="music" loop>
    <source src="" type="audio/mpeg">
</audio>

<script>
/* The Canvas */

</script>
</body>
</html>
