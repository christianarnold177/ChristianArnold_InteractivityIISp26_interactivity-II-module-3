<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes</title>
<style>
body{
    margin: 0;
    overflow: hidden;
    background: #0f0f1a;
}

#bg{
    position: fixed;
    inset: 0;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<script>
// Setting up the canvas //
const canvas = document.getElementById("bg");
const ctx = canvas.getContent("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// The Particles //
const particles = [];
const COUNT = 80;

function randomShape(){
    const shapes = ["circle", "square", "triangle", "diamond", "star", "line"];
    return shapes[Math.floor(Math.random()*shapes.length)];
}

for(let i=0; i<COUNT;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: 0,
        vy: 0,
        size: Math.random()*3+1,
        shape: randomShape(),
        hue: Math.random()*360,
        tx: null,
        ty: null
    });
}

// The Flow Field //
let time = 0;

function flowAngle(x,y){
    return Math.sin(x*0.002 + time) + Math.cos(y*0.002 + time);
}

// The Pattern System //

</script>
</body>
</html>
